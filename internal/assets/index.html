<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>API Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Cormorant+Garamond:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://unpkg.com/@knadh/oat/oat.min.css" />
    <style>
      :root {
        --page: #f4f2ee;
        --surface: rgba(255, 255, 255, 0.78);
        --surface-strong: rgba(255, 255, 255, 0.92);
        --ink: #6e655d;
        --muted: #9a9289;
        --line: rgba(110, 101, 93, 0.14);
        --line-strong: rgba(110, 101, 93, 0.22);
        --shadow: 0 12px 40px rgba(88, 79, 69, 0.06);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        background: var(--page);
        color: var(--ink);
        font-family: "Instrument Sans", sans-serif;
      }

      main {
        width: min(100%, 62rem);
        margin: 0 auto;
        min-height: 100vh;
        min-height: 100dvh;
        padding: clamp(2rem, 6vw, 4rem) 1rem calc(2rem + env(safe-area-inset-bottom));
        display: grid;
        align-content: center;
        gap: 1.25rem;
      }

      .hero {
        text-align: center;
        display: grid;
        gap: 0.5rem;
      }

      .eyebrow {
        margin: 0;
        color: var(--muted);
        font-size: 0.78rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(3.3rem, 8vw, 5.2rem);
        line-height: 0.92;
        font-weight: 600;
        letter-spacing: -0.04em;
      }

      .transcript {
        width: min(100%, 46rem);
        margin: 0 auto;
        display: grid;
        gap: 0.85rem;
      }

      .transcript[hidden] {
        display: none;
      }

      .message {
        padding: 0.95rem 1rem;
        border: 1px solid var(--line);
        border-radius: 1.2rem;
        background: rgba(255, 255, 255, 0.4);
        backdrop-filter: blur(18px);
      }

      .message[data-role="assistant"] {
        background: var(--surface-strong);
      }

      .message[data-role="error"] {
        border-color: rgba(154, 83, 83, 0.24);
        color: #8f5555;
        background: rgba(255, 246, 245, 0.92);
      }

      .message header {
        margin-bottom: 0.35rem;
        color: var(--muted);
        font-size: 0.78rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .message p {
        margin: 0;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        line-height: 1.65;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .composer {
        width: min(100%, 48rem);
        margin: 0 auto;
        border: 1px solid var(--line);
        border-radius: 1.35rem;
        padding: 1rem;
        background: var(--surface);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }

      .composer textarea {
        width: 100%;
        min-height: 8.25rem;
        resize: none;
        border: 0;
        background: transparent;
        padding: 0.2rem 0;
        box-shadow: none;
        color: var(--ink);
        font: inherit;
        line-height: 1.6;
      }

      .composer textarea:focus {
        outline: none;
      }

      .composer:focus-within {
        border-color: var(--line-strong);
        box-shadow: 0 0 0 3px rgba(110, 101, 93, 0.08), var(--shadow);
      }

      .composer textarea::placeholder {
        color: #b8b0a7;
      }

      .options {
        margin-top: 0.9rem;
        padding-top: 0.85rem;
        border-top: 1px solid var(--line);
        display: grid;
        gap: 0.85rem;
      }

      .option-grid {
        display: grid;
        gap: 0.75rem;
        grid-template-columns: repeat(auto-fit, minmax(11rem, 1fr));
      }

      .toggle {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        min-height: 2.5rem;
        padding: 0.7rem 0.8rem;
        border: 1px solid var(--line);
        border-radius: 0.95rem;
        background: rgba(255, 255, 255, 0.5);
        color: var(--ink);
        font-size: 0.92rem;
      }

      .toggle input {
        margin: 0;
      }

      .field label {
        display: block;
        margin-bottom: 0.45rem;
        color: var(--muted);
        font-size: 0.78rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .field input {
        width: 100%;
      }

      .composer footer {
        margin-top: 0.9rem;
        padding-top: 0.85rem;
        border-top: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
      }

      .status {
        color: var(--muted);
        font-size: 0.9rem;
      }

      .connection {
        margin-top: 0.9rem;
      }

      .connection summary {
        cursor: pointer;
        color: var(--muted);
        font-size: 0.88rem;
        list-style: none;
      }

      .connection summary::-webkit-details-marker {
        display: none;
      }

      .connection[open] {
        padding-top: 0.85rem;
        border-top: 1px solid var(--line);
      }

      .connection label {
        display: block;
        margin-bottom: 0.45rem;
        color: var(--muted);
        font-size: 0.78rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .connection input {
        width: 100%;
      }

      .composer button {
        min-width: 5.75rem;
        border-color: var(--line-strong);
        background: rgba(255, 255, 255, 0.88);
      }

      .composer button[disabled] {
        opacity: 0.6;
      }

      @media (max-width: 640px) {
        main {
          align-content: start;
          padding-top: 4rem;
        }

        h1 {
          font-size: clamp(2.7rem, 15vw, 4rem);
        }

        .composer {
          padding: 0.9rem;
          border-radius: 1.1rem;
        }

        .composer textarea {
          min-height: 7rem;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <p class="eyebrow">API chat</p>
        <h1>What would you like to do?</h1>
      </section>

      <section id="transcript" class="transcript" aria-live="polite" hidden></section>

      <form id="chat-form" class="composer">
        <label for="prompt" class="sr-only">Message</label>
        <textarea id="prompt" name="prompt" placeholder="Ask anything..." autocomplete="off" aria-label="Message"></textarea>
        <section class="options" aria-label="Request options">
          <div class="option-grid">
            <label class="toggle" for="thinking-enabled">
              <input id="thinking-enabled" type="checkbox" />
              <span>Thinking enabled</span>
            </label>
            <label class="toggle" for="search-enabled">
              <input id="search-enabled" type="checkbox" />
              <span>Search enabled</span>
            </label>
          </div>
          <div class="field">
            <label for="parent-message-id">Parent message ID</label>
            <input id="parent-message-id" type="text" placeholder="Optional" autocomplete="off" />
          </div>
        </section>
        <details class="connection">
          <summary>Connection</summary>
          <label for="api-key">API key</label>
          <input id="api-key" type="password" placeholder="Optional for protected proxies" autocomplete="off" />
        </details>
        <footer>
          <span id="status" class="status">Ready</span>
          <button id="send" type="submit">Send</button>
        </footer>
      </form>
    </main>

    <script>
      const form = document.querySelector("#chat-form");
      const prompt = document.querySelector("#prompt");
      const transcript = document.querySelector("#transcript");
      const status = document.querySelector("#status");
      const send = document.querySelector("#send");
      const apiKeyInput = document.querySelector("#api-key");
      const thinkingEnabledInput = document.querySelector("#thinking-enabled");
      const searchEnabledInput = document.querySelector("#search-enabled");
      const parentMessageIdInput = document.querySelector("#parent-message-id");
      const history = [];
      const SESSION_STORAGE_KEY = "chat-session-id";
      const PARENT_MESSAGE_STORAGE_KEY = "chat-parent-message-id";
      let sessionId = window.localStorage.getItem(SESSION_STORAGE_KEY);
      let parentMessageId = window.localStorage.getItem(PARENT_MESSAGE_STORAGE_KEY) || "";

      parentMessageIdInput.value = parentMessageId;

      function persistSessionId(value) {
        sessionId = value;

        if (value) {
          window.localStorage.setItem(SESSION_STORAGE_KEY, value);
          return;
        }

        window.localStorage.removeItem(SESSION_STORAGE_KEY);
      }

      function persistParentMessageId(value) {
        parentMessageId = value;
        parentMessageIdInput.value = value;

        if (value) {
          window.localStorage.setItem(PARENT_MESSAGE_STORAGE_KEY, value);
          return;
        }

        window.localStorage.removeItem(PARENT_MESSAGE_STORAGE_KEY);
      }

      function syncLayout() {
        document.querySelector("main").style.alignContent = history.length ? "start" : "center";
      }

      function setPending(isPending) {
        prompt.disabled = isPending;
        send.disabled = isPending;
        thinkingEnabledInput.disabled = isPending;
        searchEnabledInput.disabled = isPending;
        parentMessageIdInput.disabled = isPending;
        status.textContent = isPending ? "Streaming..." : "Ready";
      }

      function scrollToBottom(behavior = "auto") {
        window.scrollTo({ top: document.body.scrollHeight, behavior });
      }

      function focusPrompt() {
        if (window.matchMedia("(pointer:fine) and (min-width: 641px)").matches) {
          prompt.focus();
        }
      }

      function appendMessage(role, content) {
        transcript.hidden = false;

        const article = document.createElement("article");
        article.className = "message";
        article.dataset.role = role;

        const heading = document.createElement("header");
        heading.textContent = role === "user" ? "You" : role === "assistant" ? "Assistant" : "Error";

        const body = document.createElement("p");
        body.textContent = content;

        article.append(heading, body);
        transcript.append(article);
        syncLayout();
        scrollToBottom("smooth");
        return body;
      }

      async function streamResponse(messages, assistantNode) {
        let response;
        const requestParentMessageId = parentMessageIdInput.value.trim();

        try {
          const headers = { "content-type": "application/json" };
          const apiKey = apiKeyInput.value.trim();

          if (apiKey) {
            headers.authorization = `Bearer ${apiKey}`;
          }

          response = await fetch("/v1/chat/completions", {
            method: "POST",
            headers,
            body: JSON.stringify({
              model: "deepseek-chat",
              stream: true,
              messages,
              thinking_enabled: thinkingEnabledInput.checked,
              search_enabled: searchEnabledInput.checked,
              ...(requestParentMessageId ? { parent_message_id: requestParentMessageId } : {}),
              sessionId,
            }),
          });
        } catch (error) {
          throw error;
        }

        const nextSessionId = response.headers.get("x-chat-session-id");
        if (nextSessionId) {
          persistSessionId(nextSessionId);
        }

        const nextParentMessageId = response.headers.get("x-parent-message-id");
        if (nextParentMessageId) {
          persistParentMessageId(nextParentMessageId);
        }

        if (!response.ok) {
          const fallback = response.status === 401
            ? "Enter a valid API key in Connection to use this proxy."
            : `Request failed with status ${response.status}`;

          try {
            const data = await response.json();
            throw new Error(data.error?.message || fallback);
          } catch (error) {
            if (error instanceof Error) {
              throw error;
            }

            throw new Error(fallback);
          }
        }

        if (!response.body) {
          throw new Error("Streaming is not available in this browser.");
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        function applyLine(line) {
          if (!line.startsWith("data: ")) {
            return false;
          }

          const payload = line.slice(6);

          if (payload === "[DONE]") {
            return true;
          }

          let chunk;

          try {
            chunk = JSON.parse(payload);
          } catch {
            return false;
          }

          const delta = chunk.choices?.[0]?.delta?.content;
          if (!delta) {
            return false;
          }

          assistantNode.textContent += delta;
          scrollToBottom();
          return false;
        }

        while (true) {
          const { done, value } = await reader.read();
          if (done) {
            break;
          }

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n");
          buffer = lines.pop() ?? "";

          for (const line of lines) {
            const trimmed = line.trim();

            if (applyLine(trimmed)) {
              return;
            }
          }
        }

        const trailingLine = buffer.trim();
        if (trailingLine) {
          applyLine(trailingLine);
        }
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const content = prompt.value.trim();
        if (!content) {
          return;
        }

        const userMessage = { role: "user", content };
        history.push(userMessage);
        appendMessage("user", content);
        prompt.value = "";

        const assistantNode = appendMessage("assistant", "");
        setPending(true);

        try {
          await streamResponse(history, assistantNode);
          history.push({ role: "assistant", content: assistantNode.textContent });
        } catch (error) {
          assistantNode.closest("article")?.remove();
          appendMessage(
            "error",
            error instanceof Error ? error.message : "Something went wrong while streaming the response."
          );
        } finally {
          setPending(false);
          focusPrompt();
          scrollToBottom();
        }
      });

      prompt.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          form.requestSubmit();
        }
      });

      parentMessageIdInput.addEventListener("change", () => {
        persistParentMessageId(parentMessageIdInput.value.trim());
      });

      syncLayout();
      focusPrompt();
    </script>
  </body>
</html>
